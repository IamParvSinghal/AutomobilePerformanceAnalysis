services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      AUTO_PERFORMANCE_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

